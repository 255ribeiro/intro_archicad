[project.theme]
variant = "classic"
language = "pt-BR"


features = [
    "announce.dismiss",                  # allows users to dismiss the announcement bar
    # "content.action.view",             # adds a button to view the page source
    # "content.action.edit",             # adds a button to edit the page in the repo
    "content.code.annotate",             # enables annotations inside code blocks
    "content.code.copy",                 # adds a copy button to code blocks
    "content.code.select",               # adds a line range selection button to code blocks
    "content.footnote.tooltips",         # renders footnotes as inline tooltips
    "content.tabs.link",                 # syncs all content tabs with the same label
    "content.tooltips",                  # enables tooltips on links
    # "header.autohide",                 # hides header when scrolling down
    # "navigation.expand",               # expands all nav sections by default
    # "navigation.footer",               # adds prev/next page links in footer
    # "navigation.indexes",              # attaches index.md to section headers
    "navigation.instant",                # enables instant navigation via XHR
    "navigation.instant.prefetch",       # prefetches pages on link hover
    "navigation.instant.progress",       # shows progress bar on slow connections
    "navigation.path",                   # shows breadcrumb above page title
    # "navigation.prune",                # only renders visible nav items (reduces size)
    # "navigation.sections",             # renders top-level sections as flat groups
    # "navigation.tabs",                 # renders top-level sections as header tabs
    # "navigation.tabs.sticky",          # keeps tabs visible while scrolling
    "navigation.top",                    # shows back-to-top button
    "navigation.tracking",               # updates URL with active anchor
    "search.highlight",                  # highlights search terms after following result
    "search.share",                      # adds a share button to search results
    "search.suggest",                    # shows search suggestions while typing
    "toc.follow",                        # auto-scrolls TOC to active anchor
    # "toc.integrate",
    "content.footnote.tooltips"  ,             # moves TOC into the left navigation sidebar
    "content.action.edit",
    "content.action.view",
]

[project.theme.icon]
logo = "lucide/drafting-compass"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"


# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "lime"
accent = "yellow"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions]
attr_list = {}
md_in_html = {}
pymdownx.blocks.caption = {}

[project.markdown_extensions.footnotes]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
toc_depth = 1

